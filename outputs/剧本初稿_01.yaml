      - type: action
        character_ref: CHAR_YE
        emotion: 轻松
        description: 悦耳的手机铃声响起，叶凡拿起手机，看到是林佳的来电，按下接听键。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_YE
        emotion: 调侃
        description:
        line: 怎么，想我了？
        parenthetical:
        subtext:
        to: CHAR_LIN
      - type: dialogue
        character_ref: CHAR_LIN
        emotion: 愉快
        description:
        line: 我不太清楚聚会的地点，一会儿同去。
        parenthetical: 笑声中
        subtext:
        to: CHAR_YE
      - type: action
        character_ref: CHAR_YE
        emotion: 积极
        description: 约好相见地点后，叶凡挂断电话，拿起车钥匙出门，驱车前往约定地点。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_YE
        emotion: 耐心
        description: 叶凡在百盛商场前找了个停车位，下车走到路边等候。城市沐浴在夕阳的余晖中，车流不息。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_LIN
        emotion: 自信
        description: 一辆丰田车停在路边，林佳打开车门走下来，她穿着紧身牛仔裤和紫色T恤，面容精致，曲线婀娜。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_YE
        emotion: 玩笑
        description:
        line: 还有专车接送啊。
        parenthetical:
        subtext:
        to: CHAR_LIN
      - type: dialogue
        character_ref: CHAR_LIN
        emotion: 嗔怪带笑
        description:
        line: 少挖苦我，我可没有专车司机，那是咱班同学刘云志。
        parenthetical:
        subtext:
        to: CHAR_YE
      - type: dialogue
        character_ref: CHAR_LIN
        emotion: 关心
        description:
        line: 两年多未见，还好吗？
        parenthetical:
        subtext:
        to: CHAR_YE
      - type: dialogue
        character_ref: CHAR_YE
        emotion: 调侃
        description:
        line: 还好。林佳你这样天生丽质不去演艺圈发展实在对不起自己。
        parenthetical:
        subtext:
        to: CHAR_LIN
      - type: dialogue
        character_ref: CHAR_LIN
        emotion: 妩媚带笑
        description:
        line: 欠打吧？
        parenthetical:
        subtext:
        to: CHAR_YE
      - type: action
        character_ref: CHAR_LIU
        emotion: 冷静
        description: 停在路边的丰田车窗降下，驾驶位上露出刘云志的面孔，他淡淡地看着叶凡和林佳。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_LIU
        emotion: 平淡
        description:
        line: 好久未见。
        parenthetical:
        subtext:
        to: CHAR_YE
      - type: dialogue
        character_ref: CHAR_YE
        emotion: 平淡
        description:
        line: 是啊。有时间我们出来聚聚。
        parenthetical:
        subtext:
        to: CHAR_LIU
      - type: dialogue
        character_ref: CHAR_LIU
        emotion: 轻视
        description:
        line: 打车过来的？
        parenthetical:
        subtext:
        to: CHAR_YE
      - type: dialogue
        character_ref: CHAR_YE
        emotion: 无所谓
        description:
        line: 嗯。
        parenthetical:
        subtext:
        to: CHAR_LIU
      - type: dialogue
        character_ref: CHAR_LIN
        emotion: 圆场
        description:
        line: 这一次匆匆忙忙赶来，给留在这座城市的几位老同学都打了电话，我们坐刘云志的车一起走吧。
        parenthetical:
        subtext:
        to: CHAR_YE
      - type: dialogue
        character_ref: CHAR_LIU
        emotion: 假意抱歉
        description:
        line: 真是不好意思，已经提前约好另外两个老同学，就在前面的路口，座位好像不够啊。
        parenthetical:
        subtext:
        to: CHAR_YE
      - type: dialogue
        character_ref: CHAR_YE
        emotion: 淡然
        description:
        line: 没关系，你先走，我随后就到。
        parenthetical:
        subtext:
        to: CHAR_LIU
      - type: dialogue
        character_ref: CHAR_YE
        emotion: 询问
        description:
        line: 和我一起走，还是……
        parenthetical:
        subtext:
        to: CHAR_LIN
      - type: dialogue
        character_ref: CHAR_LIU
        emotion: 催促
        description:
        line: 林大美女还是坐我的车先走吧，不然我怕会被人以口水淹死。
        parenthetical:
        subtext:
        to: CHAR_LIN
      - type: action
        character_ref: CHAR_LIN
        emotion: 歉意、犹豫
        description: 林佳面露歉意，犹豫了一下，最终还是坐进了丰田车，并向叶凡投去一个歉然的微笑。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_LIU
        emotion: 不屑
        description:
        line: 现在正是下班高峰时间段，能等到出租车才怪！
        parenthetical:
        subtext: 看不起叶凡
        to: CHAR_LIN
      - type: action
        character_ref: CHAR_LIU
        emotion: 轻视
        description: 车窗升起，丰田车绝尘而去。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_YE
        emotion: 感慨
        description: 叶凡站在原地，目送丰田车远去。红日已落，天际暗淡，夜幕即将落下，城市被灰暗笼罩。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ASTRONAUTS
        emotion: 震撼、敬畏
        description: 画面切换至深沉太空，九具庞大的龙尸拉着一口青铜巨棺，横亘在漆黑冰冷的宇宙中，景象神秘而震撼。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ASTRONAUTS
        emotion: 震惊、紧张
        description: 国际空间站内，几名宇航员盯着屏幕，将这足以震世的一幕影像传回地面，随后默默等待总部的指示。
        line:
        parenthetical:
        subtext:
        to:

title: num_00
author: AI 辅助改编
assets:
  characters:
    - id: CHAR_NASA_CTRL
      name: 美国宇航局监控人员
      aliases: []
      type: supporting
      description: 在宇航局主监控室内看到旅行者二号传送回的神秘数据的宇航局人员们，震惊不已。
      traits:
        - 震惊
        - 集体
        - 难以置信
      voice_tone: 集体惊呼：上帝，我看到了什么？这怎么可能！
    - id: CHAR_ISS_ASTR
      name: 国际空间站宇航员
      aliases:
        - 宇航精英
      type: supporting
      description: 在国际空间站内目睹九龙拉棺的宇航员们，思想受到强烈冲击。
      traits:
        - 震惊
        - 难以置信
        - 呼叫地球
      voice_tone: 呼叫地球……
  locations:
    - id: LOC_NASA_CTRL_ROOM
      name: 美国宇航局主监控室
      type: INT
      description: 宇航局接收并分析旅行者二号数据的主监控室，人们在此看到震撼画面。
    - id: LOC_ISS
      name: 国际空间站内部
      type: INT
      description: 绕地飞行的国际空间站内部，宇航员在此目睹九龙拉棺。
    - id: LOC_OUTER_SPACE
      name: 外太空
      type: EXT
      description: 黑暗冰冷的宇宙空间，龙尸和青铜巨棺漂浮之处。
  props:
    - 旅行者二号太空探测器
    - 镀金唱片（向宇宙致意）
    - 九具五爪黑龙尸体
    - 碗口粗的黑色铁索
    - 长达二十米的青铜棺椁
    - 神秘数据信息
scenes:
  - scene_id: S01
    slug: EXT. 外太空 - 永恒的黑夜
    location_ref: LOC_OUTER_SPACE
    time_of_day: 夜
    summary: 旅行者二号探测器在浩瀚宇宙中飞行，发现九具庞大的龙尸和一口青铜巨棺，由黑色铁索连接，亘古漂浮。
    intention: 引出核心奇观，设定故事的神秘基调。
    beats:
      - type: action
        character_ref:
        emotion:
        description: 旅行者二号在黑暗与冰冷的宇宙中飞行，传感器捕捉到前方九具庞大的尸体静静横陈。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_NASA_CTRL
        emotion: 紧张
        description: 美国宇航局主监控室接收到旅行者二号传回的神秘数据信息，技术人员紧张破译还原。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_NASA_CTRL
        emotion: 震惊
        description: 画面还原后，九具庞大尸体横在星空中，监控室内所有人震惊到如木雕泥塑般一动不动。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_NASA_CTRL
        emotion: 震惊
        description:
        line: 上帝，我看到了什么？
        parenthetical:
        subtext: 难以相信眼前所见
        to:
      - type: dialogue
        character_ref: CHAR_NASA_CTRL
        emotion: 难以置信
        description:
        line: 这怎么可能，无法相信！
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref:
        emotion:
        description: 旅行者二号传送信息后继续驶向幽暗深远的星域，不久发生故障，中断与地球的讯号传送。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ISS_ASTR
        emotion: 震撼
        description: 国际空间站内，宇航员透过舷窗看到冰冷宇宙中九具长达百米的五爪黑龙龙尸，以及被铁索连接的一口二十米青铜巨棺，亘古漂浮。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_ISS_ASTR
        emotion: 震惊
        description:
        line: 那是……
        parenthetical: 瞳孔急骤收缩
        subtext: 被眼前的九龙拉棺景象彻底冲击
        to:
      - type: dialogue
        character_ref: CHAR_ISS_ASTR
        emotion: 急切
        description:
        line: 呼叫地球……
        parenthetical:
        subtext: 发现惊天奇异现象，需立即向地面报告
        to:
  - scene_id: S02
    slug: INT. 美国宇航局主监控室 - 日
    location_ref: LOC_NASA_CTRL_ROOM
    time_of_day: 日
    summary: 美国宇航局监控人员接收到旅行者二号传送回的神秘数据，破译还原后看到九龙拉棺的震撼画面，所有人震惊失语。
    intention: 展现人类首次发现异象的官方反应，推进悬念。
    beats:
      - type: action
        character_ref: CHAR_NASA_CTRL
        emotion: tension
        description: 美国宇航局主监控室内，监控人员正在紧张地接收并破译旅行者二号传送回的一组神秘数据。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_NASA_CTRL
        emotion: shock
        description: 大屏幕上还原出画面：黑暗宇宙中，九具庞大的尸体静静横陈。所有人员同时变色，如木雕泥塑般一动不动，震惊到无以复加。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_NASA_CTRL
        emotion: shock
        description:
        line: 上帝，我看到了什么？
        parenthetical:
        subtext: 难以置信眼前的景象
        to:
      - type: dialogue
        character_ref: CHAR_NASA_CTRL
        emotion: shock
        description:
        line: 这怎么可能，无法相信！
        parenthetical:
        subtext: 世界观受到冲击
        to:
      - type: action
        character_ref: CHAR_NASA_CTRL
        emotion: lingering shock
        description: 监控画面中，旅行者二号匆匆掠过那片星空，驶向更遥远的黑暗，随后中断了讯号。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ISS_ASTR
        emotion: surprise
        description: 国际空间站外，漆黑的宇宙中，九条长达百米的黑色龙尸如钢铁长城般横亘，龙角晶莹，鳞片乌光烁烁。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ISS_ASTR
        emotion: shock
        description: 几名宇航员瞳孔急骤收缩，思想受到强烈冲击，他们看到龙尸尾端绑缚着粗长的黑色铁索，连向一口二十米长的青铜巨棺，九龙拉棺！
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_ISS_ASTR
        emotion: shock
        description:
        line: 那是……
        parenthetical: 声音颤抖，话未说完
        subtext: 震惊得说不出话
        to:
      - type: dialogue
        character_ref: CHAR_ISS_ASTR
        emotion: urgent
        description:
        line: 呼叫地球……
        parenthetical: 急促地
        subtext: 紧急汇报所见
        to:
  - scene_id: S03
    slug: INT. 国际空间站内部 - 日
    location_ref: LOC_ISS
    time_of_day: 日
    summary: 国际空间站内，几名宇航员目睹窗外九具龙尸拉着青铜巨棺，受到强烈冲击，急忙呼叫地球。
    intention: 从另一视角再次确认九龙拉棺的真实性，并引出呼叫地球的情节，为后续发展铺垫。
    beats:
      - type: action
        character_ref: CHAR_ISS_ASTR
        emotion: shock
        description: 几名宇航员透过舷窗看到宇宙中的景象，同时变了颜色，瞳孔急骤收缩。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ISS_ASTR
        emotion: awe
        description: 他们看到九具百米长的五爪黑龙尸体，尾端绑缚黑色铁索，连向一口巨大的青铜古棺。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ISS_ASTR
        emotion: urgency
        description: 一名宇航员从震惊中回过神来，急忙启动通讯设备。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_ISS_ASTR
        emotion: urgent
        description:
        line: 呼叫地球……
        parenthetical:
        subtext:
        to: CHAR_NASA_CTRL

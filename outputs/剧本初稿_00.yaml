scenes:
  - scene_id: S01
    slug: INT. 美国宇航局主监控室 - 日
    location_ref: LOC_NASA
    time_of_day: day
    summary: 美国宇航局主监控室接收到旅行者二号传送回的神秘数据，破译还原后显示九具龙尸漂浮在宇宙中的画面，所有人员震惊沸腾。
    intention: 引入第一个重大发现，制造悬念，展现人类对未知的震撼，为后续空间站的目击做铺垫。
    beats:
      - type: action
        character_ref: CHAR_NASA
        emotion: 紧张专注
        description: 工作人员紧张地破译旅行者二号传回的神秘数据，大屏幕上逐渐还原出图像。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_NASA
        emotion: 震惊
        description: 当画面清晰显示九具庞大的龙尸漂浮在宇宙中时，监控室内所有人同时变色，震惊得呆若木鸡。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_NASA
        emotion: 兴奋沸腾
        description: 过了很久，人们才回过神来，随即整个监控室沸腾起来。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_NASA
        emotion: 震惊
        description:
        line: 上帝，我看到了什么？
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_NASA
        emotion: 难以置信
        description:
        line: 这怎么可能，无法相信！
        parenthetical:
        subtext:
        to:
  - scene_id: S02
    slug: INT. 国际空间站 - 日
    location_ref: LOC_ISS
    time_of_day: day
    summary: 国际空间站内的宇航员透过舷窗目击到太空中九具黑龙尸体拖拽着一口青铜巨棺，受到强烈冲击后立即呼叫地球。
    intention: 进一步揭示九龙拉棺的完整画面，将神秘事件直接呈现给宇航员，推动叙事进入高潮，并开启后续剧情。
    beats:
      - type: action
        character_ref: CHAR_ISS
        emotion: shock
        description: 国际空间站内，几名宇航员正在执行日常任务。突然，一名宇航员透过舷窗看到了什么，脸色骤变。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ISS
        emotion: shock
        description: 其他宇航员注意到同伴的异常，纷纷望向舷窗，同时变色，瞳孔收缩。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ISS
        emotion: awe
        description: 舷窗外，冰冷黑暗的宇宙中，九条长达百米的黑色龙尸横陈，鳞片闪烁乌光，龙角晶莹剔透。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_ISS
        emotion: shock
        description:
        line: 那是……
        parenthetical:
        subtext: 无法相信眼前所见
        to:
      - type: action
        character_ref: CHAR_ISS
        emotion: awe
        description: 龙尸尾端绑缚着碗口粗的黑色铁索，连向后方黑暗中的一口长达二十米的青铜巨棺，棺上模糊的古老图案若隐若现。
        line:
        parenthetical:
        subtext:
        to:
      - type: action
        character_ref: CHAR_ISS
        emotion: overwhelmed
        description: 宇航员们被九龙拉棺的景象深深震撼，如木雕泥塑般一动不动。
        line:
        parenthetical:
        subtext:
        to:
      - type: dialogue
        character_ref: CHAR_ISS
        emotion: urgency
        description:
        line: 呼叫地球……
        parenthetical:
        subtext: 必须立即向地球报告这个惊人发现
        to:
